<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#ffffff;font-family:Arial,sans-serif;">
<title>Biashara Brain Architecture</title>
<desc>System architecture showing how the React frontend, FastAPI backend, Supabase database, and Qwen Cloud MemoryAgent connect</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- USER -->
<rect x="270" y="20" width="140" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="42" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Business owner</text>
<text x="340" y="60" text-anchor="middle" font-size="12" fill="#5F5E5A">Text, voice, images</text>

<!-- Arrow user to frontend -->
<line x1="340" y1="72" x2="340" y2="108" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- FRONTEND -->
<rect x="210" y="108" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="130" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Frontend</text>
<text x="340" y="150" text-anchor="middle" font-size="12" fill="#3C3489">React + Tailwind — Vercel</text>

<!-- Arrow frontend to backend -->
<line x1="340" y1="164" x2="340" y2="210" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="358" y="192" font-size="12" fill="#5F5E5A">REST API</text>

<!-- BACKEND -->
<rect x="210" y="210" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="232" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Backend</text>
<text x="340" y="252" text-anchor="middle" font-size="12" fill="#085041">FastAPI (Python) — Railway</text>

<!-- Arrow backend to Supabase -->
<line x1="260" y1="266" x2="160" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow backend to Qwen -->
<line x1="420" y1="266" x2="520" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- SUPABASE -->
<rect x="60" y="340" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="160" y="362" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">Supabase</text>
<text x="160" y="380" text-anchor="middle" font-size="12" fill="#0C447C">PostgreSQL — business memory</text>

<!-- QWEN CLOUD -->
<rect x="420" y="340" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="520" y="362" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Qwen Cloud</text>
<text x="520" y="380" text-anchor="middle" font-size="12" fill="#633806">MemoryAgent API</text>

<!-- Return arrows -->
<path d="M160 340 L160 295 L210 266" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M520 340 L520 295 L420 266" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow Supabase to memory store -->
<line x1="200" y1="396" x2="280" y2="450" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Arrow Qwen to memory store -->
<line x1="480" y1="396" x2="400" y2="450" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- MEMORY STORE -->
<rect x="180" y="450" width="320" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="468" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Business memory store</text>
<text x="340" y="484" text-anchor="middle" font-size="12" fill="#5F5E5A">Customers · suppliers · agreements · history</text>
</svg>
